<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050b14;
  overflow: hidden;
  color: white;
}

/* ❄️ Background */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.snow span {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}

/* BOX */
.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  background: rgba(0,0,0,0.7);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 0 20px cyan;
}

/* PROFILE */
.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid cyan;
  margin: auto;
  overflow: hidden;
}

.profile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TITLE */
h2 {
  color: cyan;
  margin: 15px 0;
}

/* ICONS */
.icons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
}

.icon {
  width: 45px;
  height: 45px;
  background: black;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px cyan;
  transition: 0.3s;
}

.icon img {
  width: 22px;
}

.icon:hover {
  transform: scale(1.2);
  box-shadow: 0 0 25px cyan;
}

/* BUTTON */
.music-btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px cyan;
}

.music-btn:active {
  transform: scale(0.95);
}

/* TIME */
.time {
  margin-top: 10px;
  background: black;
  padding: 8px 15px;
  border-radius: 20px;
  display: inline-block;
  color: cyan;
  font-weight: bold;
}

/* TEXT */
.text {
  margin-top: 15px;
  color: lime;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC (FIXED LINK) -->

<!-- MAIN -->

  </div>

  <h2>Sharaf Uddin Official</h2>

  <!-- SOCIAL -->
  <div class="icons">

    <a class="icon" href="https://www.facebook.com/profile.php?id=61572045149392" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

    <a class="icon" href="https://www.tiktok.com/@mdraju_3m" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

    <a class="icon" href="https://t.me/Smart_Method_Owner" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">

  <!-- MUSIC BUTTON -->

  <!-- TIME -->

    I'm Sharaf Uddin<br>
    Welcome to my profile<br>
    Developer & Cyber Expert
  </div>

</div>

<script>

/* TIME */
function updateTime() {
  let now = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" });
  let date = new Date(now);

  let h = date.getHours();
  let m = date.getMinutes();
  let s = date.getSeconds();

  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  h = h ? h : 12;

  document.getElementById("time").innerHTML =
    "⏰ " + h + ":" + m + ":" + s + " " + ampm;
}

updateTime();
setInterval(updateTime, 1000);

/* ❄️ EMOJI */
const snow = document.getElementById("snow");

function createEmoji() {
  const span = document.createElement("span");
  span.innerHTML = "❄️";
  span.style.left = Math.random() * 100 + "vw";
  span.style.animationDuration = (Math.random() * 3 + 2) + "s";

  snow.appendChild(span);

  setTimeout(() => {
    span.remove();
  }, 5000);
}

setInterval(createEmoji, 150);

/* 🎵 MUSIC FIX */
function playMusic() {
  document.getElementById("bgmusic").play();
}

</script>

</body>
</html>
