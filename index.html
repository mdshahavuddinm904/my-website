<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  color:white;
  overflow:hidden;
}

/* ❄️ background */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* container */
.container{
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  margin:30px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

/* logo */
.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid cyan;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px 0;
}

.icon{
  width:42px;
  height:42px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px cyan;
  transition:0.3s;
}

.icon img{
  width:20px;
}

.icon:hover{
  transform:scale(1.2);
  box-shadow:0 0 20px cyan;
}

/* welcome */
.welcome{
  margin-top:10px;
  color:lime;
  font-size:14px;
}

/* buttons */
.btn{
  margin:6px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
}

/* time on button */
.timeOnBtn{
  display:block;
  font-size:12px;
  color:black;
  margin-bottom:5px;
}

/* bottom text */
.bottom{
  margin-top:15px;
  color:#00ff99;
  font-size:13px;
  line-height:1.6;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777203976940.mp3">
</audio>

<!-- ❄️ background -->
<div class="snow" id="snow"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <!-- NAME -->
  <h2>Sharaf Uddin Official</h2>

  <!-- ICONS -->
  <div class="icons">
    <a class="icon" href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a class="icon" href="https://tiktok.com"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    <a class="icon" href="https://t.me"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
  </div>

  <!-- WELCOME -->
  <div class="welcome">👋 Welcome to my official website</div>

  <!-- MUSIC BUTTON -->
  <button class="btn" onclick="playMusic()">🎵 Play Music</button>

  <!-- TIME BUTTON (time inside button) -->
  <button class="btn" onclick="showTime()">
    <span class="timeOnBtn" id="timeBtn">⏰ Click for Time</span>
  </button>

  <!-- BOTTOM TEXT -->
  <div class="bottom">
    ⏳ এখানে টাইম টাইপিং হচ্ছে...<br>
    📩 এমন ওয়েবসাইট লাগলে অবশ্যই টেলিগ্রামে মেসেজ দিয়েন<br>
    🙏 ধন্যবাদ 💙✨
  </div>

</div>

<script>

/* ❄️ snow */
const snow=document.getElementById("snow");

function drop(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(drop,150);

/* 🎵 music */
function playMusic(){
  document.getElementById("bgmusic").play();
}

/* ⏰ time on button */
function showTime(){
  let t=new Date().toLocaleString("en-US",{timeZone:"Asia/Dhaka"});
  document.getElementById("timeBtn").innerHTML="⏰ "+t;
}

</script>

</body>
</html>
