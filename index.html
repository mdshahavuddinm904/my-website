<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  overflow:hidden;
  color:white;
}

/* ❄️ BACKGROUND */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.snow span{
  position:absolute;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* MAIN */
.container{
  position:relative;
  width:90%;
  max-width:400px;
  margin:40px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px cyan;
  text-align:center;
}

/* PROFILE */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid cyan;
  margin:auto;
  overflow:hidden;
}

.profile img{
  width:100%;
}

/* 🔥 ANIMATED NAME */
h2{
  color:cyan;
  margin:15px 0;
  animation:shake 2s infinite;
  text-shadow:0 0 10px cyan;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* ICONS */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.icon{
  width:45px;
  height:45px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px cyan;
  transition:0.3s;
}

.icon img{
  width:22px;
}

.icon:hover{
  transform:scale(1.2);
  box-shadow:0 0 25px cyan;
}

/* 🔘 BUTTON STYLE */
.btn{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
  box-shadow:0 0 10px cyan;
}

.btn:active{
  transform:scale(0.95);
}

/* TEXT */
.text{
  margin-top:15px;
  color:lime;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777203976940.mp3">
</audio>

<!-- ❄️ BACKGROUND -->
<div class="snow" id="snow"></div>

<div class="container">

  <div class="profile">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <h2>🔥 Sharaf Uddin Official 🔥</h2>

  <!-- ICONS -->
  <div class="icons">

    <a class="icon" href="https://facebook.com" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

    <a class="icon" href="https://tiktok.com" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>

    <a class="icon" href="https://t.me" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

  </div>

  <!-- BUTTONS -->
  <button class="btn" onclick="playMusic()">🎵 Music</button>
  <button class="btn" onclick="showTime()">⏰ Time</button>

  <div class="text" id="timeBox"></div>

</div>

<script>

/* ❄️ EMOJI */
const snow=document.getElementById("snow");

function emoji(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(emoji,150);

/* 🎵 MUSIC */
function playMusic(){
  document.getElementById("bgmusic").play();
}

/* ⏰ TIME BUTTON */
function showTime(){
  let d=new Date().toLocaleString("en-US",{timeZone:"Asia/Dhaka"});
  document.getElementById("timeBox").innerHTML="⏰ "+d;
}

</script>

</body>
</html>
