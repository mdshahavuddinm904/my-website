<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  color:white;
  overflow:hidden;
}

/* ❄️ snow */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* container */
.container{
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  margin:30px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

/* logo */
.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid cyan;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px 0;
}

.icon{
  width:42px;
  height:42px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px cyan;
  transition:0.2s;
}

.icon img{
  width:20px;
}

.icon:hover{
  transform:scale(1.2);
}

/* buttons */
.btn{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
  transition:0.2s;
}

.btn:active{
  transform:scale(1.2);
}

/* typing text */
.bottom{
  margin-top:15px;
  font-size:13px;
  color:#00ff99;
  line-height:1.6;
  white-space:pre-line;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777217719241.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 CLICK SOUND -->
<audio id="clickSound">
  <source src="https://www.myinstants.com/media/sounds/mouse-click.mp3" type="audio/mpeg">
</audio>

<!-- ❄️ snow -->
<div class="snow" id="snow"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <!-- NAME -->
  <h2>Sharaf Uddin Official</h2>

  <!-- SOCIAL ICONS (1 LINE) -->
  <div class="icons">

    <a class="icon" href="https://www.facebook.com/share/18Y2Cbkgkt/" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

    <a class="icon" href="https://www.tiktok.com/@mdraju_3m?_r=1&_t=ZS-95rSJ1P5Ulm" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>

    <a class="icon" href="https://t.me/Smart_Method_Owner" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

    <a class="icon" href="https://www.facebook.com/profile.php?id=61572045149392" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </a>

  </div>

  <!-- 🔽 IMO BUTTON (NEW LINE BELOW) -->
  <div class="icons">

    <a class="icon" href="imo://chat?u=YOUR_IMO_NUMBER" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

  </div>

  <!-- BUTTONS -->
  <button class="btn" onclick="toggleMusic(); playClick()">🎵 Music</button>
  <button class="btn" id="timeBtn" onclick="playClick()">⏰ Time</button>

  <!-- TEXT -->
  <div class="bottom" id="typing"></div>

</div>

<script>

/* click sound */
function playClick(){
  let c=document.getElementById("clickSound");
  c.currentTime=0;
  c.play().catch(()=>{});
}

/* snow */
const snow=document.getElementById("snow");

function drop(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(drop,80);

/* music */
let music=document.getElementById("bgmusic");
let isPlaying=false;

function toggleMusic(){
  if(!isPlaying){
    music.play().then(()=>isPlaying=true);
  }else{
    music.pause();
    isPlaying=false;
  }
}

/* time */
function updateTime(){
  let now=new Date();

  let h=now.getHours();
  let m=String(now.getMinutes()).padStart(2,"0");
  let s=String(now.getSeconds()).padStart(2,"0");

  let ampm=h>=12?"PM":"AM";
  h=h%12;
  h=h?h:12;

  document.getElementById("timeBtn").innerHTML=
  "⏰ "+h+":"+m+":"+s+" "+ampm;
}
setInterval(updateTime,1000);
updateTime();

/* typing */
let text="👋 Hey Welcome to my Bio Website 🌐✨\n\n💙 My Name: Sharaf Uddin\n🎂 Age: 20+\n💼 Work: Forex & Binary Trading 📊💹\n🚀 Goal: Online Business & Financial Freedom 💰🔥";

let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();

</script>

</body>
</html>
