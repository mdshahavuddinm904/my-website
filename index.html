<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  overflow:hidden;
  color:white;
}

/* ❄️ background */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* box */
.container{
  position:relative;
  width:90%;
  max-width:400px;
  margin:40px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px cyan;
  text-align:center;
}

/* welcome */
.welcome{
  color:cyan;
  font-size:18px;
  margin-bottom:10px;
  text-shadow:0 0 10px cyan;
}

/* profile */
.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid cyan;
  margin:auto;
  overflow:hidden;
}

.profile img{
  width:100%;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:15px 0;
}

.icon{
  width:42px;
  height:42px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px cyan;
  transition:0.3s;
}

.icon img{
  width:20px;
}

.icon:hover{
  transform:scale(1.2);
  box-shadow:0 0 20px cyan;
}

/* buttons */
.btn{
  margin:6px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
}

/* emoji line */
.emoji-line{
  margin:10px 0 5px;
  font-size:18px;
}

/* time box */
.timeBox{
  margin-top:10px;
  color:lime;
  display:none;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777203976940.mp3">
</audio>

<!-- ❄️ background -->
<div class="snow" id="snow"></div>

<div class="container">

  <!-- welcome -->
  <div class="welcome">👋 Welcome to Sharaf Uddin Official</div>

  <!-- profile -->
  <div class="profile">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <h2>Sharaf Uddin Official</h2>

  <!-- icons -->
  <div class="icons">
    <a class="icon" href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a class="icon" href="https://tiktok.com"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    <a class="icon" href="https://t.me"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
  </div>

  <!-- music button -->
  <button class="btn" onclick="playMusic()">🎵 Music</button>

  <!-- emoji line ABOVE time button -->
  <div class="emoji-line">❄️ ✨ 💙</div>

  <!-- time button -->
  <button class="btn" onclick="showTime()">⏰ Show Time</button>

  <div class="timeBox" id="timeBox"></div>

</div>

<script>

/* snow */
const snow=document.getElementById("snow");

function emoji(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(emoji,150);

/* music */
function playMusic(){
  document.getElementById("bgmusic").play();
}

/* time click show */
function showTime(){
  let t=new Date().toLocaleString("en-US",{timeZone:"Asia/Dhaka"});
  let box=document.getElementById("timeBox");
  box.style.display="block";
  box.innerHTML="⏰ "+t;
}

</script>

</body>
</html>
