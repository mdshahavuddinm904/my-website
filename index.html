<!DOCTYPE html>
<html lang="en">
<head>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  color:white;
  overflow:hidden;
}

/*  snow */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
  opacity:0.9;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* container */
.container{
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  margin:30px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

/* logo */
.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid cyan;
  box-shadow:0 0 15px cyan, 0 0 30px cyan;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
  text-shadow:0 0 10px cyan, 0 0 20px cyan;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:15px 0;
}

.icon{
  width:48px;
  height:48px;
  background:rgba(0,0,0,0.9);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid cyan;
  box-shadow:0 0 10px cyan, 0 0 20px cyan;
  transition:0.2s;
}

.icon img{
  width:24px;
  filter:drop-shadow(0 0 8px cyan);
}

.icon:hover{
  transform:scale(1.25);
  box-shadow:0 0 20px cyan, 0 0 40px cyan;
}

/* buttons */
.btn{
  margin:8px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
  box-shadow:0 0 10px cyan, 0 0 20px cyan;
  transition:0.2s;
}

.btn:hover{
  box-shadow:0 0 20px cyan, 0 0 40px cyan;
}

.btn:active{
  transform:scale(1.2);
}

/* typing text */
.bottom{
  margin-top:15px;
  font-size:13px;
  color:#00ff99;
  line-height:1.6;
  white-space:pre-line;
  text-shadow:0 0 5px #00ff99;
}
</style>
</head>

<script>

/*  click sound */
function playClick(){
  let click = document.getElementById("clickSound");
  click.currentTime = 0;
  click.play().catch(()=>{});
}

/*  snow */
const snow=document.getElementById("snow");

function drop(){
  let s=document.createElement("span");
  s.innerHTML="";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(drop,80);

/*  MUSIC TOGGLE */
let music=document.getElementById("bgmusic");
let isPlaying=false;

function toggleMusic(){
  if(!isPlaying){
    music.play().then(()=>{
      isPlaying=true;
    }).catch(()=>{
      alert("Tap again to start music ");
    });
  }else{
    music.pause();
    isPlaying=false;
  }
}

/*  REAL TIME */
function updateTime(){
  let now=new Date();

  let h=now.getHours();
  let m=String(now.getMinutes()).padStart(2,"0");
  let s=String(now.getSeconds()).padStart(2,"0");

  let ampm=h>=12?"PM":"AM";
  h=h%12;
  h=h?h:12;

  document.getElementById("timeBtn").innerHTML=
  " "+h+":"+m+":"+s+" "+ampm;
}
