<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  color:white;
  overflow:hidden;
}

/* ❄️ background */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* container */
.container{
  position:relative;
  width:90%;
  max-width:400px;
  margin:30px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

/* logo */
.logo img{
  width:90px;
  border-radius:50%;
  border:3px solid cyan;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px 0;
}

.icon{
  width:42px;
  height:42px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px cyan;
}

.icon img{
  width:20px;
}

/* welcome */
.welcome{
  margin-top:10px;
  color:lime;
  font-size:14px;
}

/* BUTTON */
.btn{
  margin:6px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:cyan;
  font-weight:bold;
  transition:0.2s;
}

/* press effect */
.btn:active{
  transform:scale(1.2);
}

/* typing text bottom */
.bottom{
  position:absolute;
  bottom:10px;
  left:0;
  right:0;
  font-size:13px;
  color:#00ff99;
  padding:10px;
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777203976940.mp3">
</audio>

<div class="snow" id="snow"></div>

<div class="container">

  <div class="logo">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <h2>Sharaf Uddin Official</h2>

  <div class="icons">
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
  </div>

  <div class="welcome">👋 Welcome to my website</div>

  <button class="btn" onclick="playMusic()">🎵 Music</button>
  <button class="btn" onclick="showTime(this)">⏰ Time</button>

  <!-- typing text -->
  <div class="bottom" id="typing"></div>

</div>

<script>

/* ❄️ snow */
const snow=document.getElementById("snow");

function drop(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}
setInterval(drop,150);

/* 🎵 music */
function playMusic(){
  let m=document.getElementById("bgmusic");
  m.play();
}

/* ⏰ time button enlarge + show */
function showTime(btn){
  btn.style.transform="scale(1.2)";
  setTimeout(()=>btn.style.transform="scale(1)",200);

  let t=new Date().toLocaleString("en-US",{timeZone:"Asia/Dhaka"});
  btn.innerHTML="⏰ "+t;
}

/* ✍️ typing effect */
let text="📩 এমন ওয়েবসাইট লাগলে অবশ্যই টেলিগ্রামে মেসেজ দিয়েন\n🙏 ধন্যবাদ 💙";

let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,50);
  }
}
type();

</script>

</body>
</html>
