<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* container */
.container{
  width:90%;
  max-width:400px;
  margin:50px auto;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px cyan;
}

/* logo */
.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid cyan;
}

/* name */
h2{
  color:cyan;
  margin:10px 0;
}

/* buttons */
.btn{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:cyan;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(1.2);
}

/* welcome */
.welcome{
  margin:10px 0;
  color:lime;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://i.postimg.cc/pLR7bfkS/IMG-20260426-143020-930.jpg">
  </div>

  <!-- NAME -->
  <h2>Sharaf Uddin Official</h2>

  <!-- WELCOME -->
  <div class="welcome">👋 Welcome to my website</div>

  <!-- MUSIC -->
  <audio id="bgmusic" loop>
    <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777203976940.mp3">
  </audio>

  <button class="btn" id="musicBtn" onclick="toggleMusic()">🎵 Music</button>

  <button class="btn" onclick="showTime(this)">⏰ Time</button>

</div>

<script>

let music = document.getElementById("bgmusic");
let btn = document.getElementById("musicBtn");

/* 🔥 AUTO PLAY TRY */
window.addEventListener("load", () => {
  music.play().catch(()=>{});
});

/* 🎵 MUSIC TOGGLE */
function toggleMusic(){
  if(music.paused){
    music.play();
    btn.innerText = "🎵 Music ON";
  }else{
    music.pause();
    btn.innerText = "🎵 Music OFF";
  }
}

/* ⏰ TIME BUTTON */
function showTime(btnEl){
  let t=new Date().toLocaleString("en-US",{timeZone:"Asia/Dhaka"});
  btnEl.innerText="⏰ "+t;

  btnEl.style.transform="scale(1.2)";
  setTimeout(()=>btnEl.style.transform="scale(1)",200);
}

</script>

</body>
</html>
